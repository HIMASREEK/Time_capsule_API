<!DOCTYPE html>
<html>
<head>
    <title>Shared Capsule</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease;
        }

        img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .countdown {
            margin-top: 15px;
            font-size: 18px;
            color: #facc15;
        }

        .tag {
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>📦 {{ capsule.title }}</h2>

    {% if capsule.image %}
        <img src="{{ capsule.image.url }}">
    {% endif %}

    {% if capsule.unlock_date > now %}

        <h3>🔒 Locked</h3>
        <p class="countdown" id="countdown"></p>

    {% else %}

        <p>{{ capsule.message }}</p>

    {% endif %}

    <div class="tag">
        👤 Shared by {{ capsule.user.username }}
    </div>

</div>

<script>
var unlockDate = new Date("{{ capsule.unlock_date|date:'Y-m-d H:i:s' }}").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = unlockDate - now;

    if (distance > 0) {
        var days = Math.floor(distance / (1000*60*60*24));
        var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

        document.getElementById("countdown").innerHTML =
            "⏳ " + days + "d " + hours + "h " + minutes + "m";
    } else {
        location.reload();  // auto refresh when unlocked
    }
}, 1000);
</script>

</body>
</html>
