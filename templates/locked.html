<!DOCTYPE html>
<html>
<head>
    <title>Locked Capsule</title>

    <style>
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .box {
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔒 Capsule Locked</h2>
    <p>Come back later to unlock the memory ⏳</p>
</div>

</body>
</html>
