<!DOCTYPE html>
<html>
<head>
    <title>⏳ Time Capsule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #b2edca;
            min-height: 100vh;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background: #0f766e !important; /* teal */
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }

        /* Cards */
        .card {
            border-radius: 12px;
            border: none;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* Buttons */
        .btn-primary {
            background: #0f766e;
            border: none;
        }

        .btn-warning {
            background: #f59e0b;
            border: none;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            border: none;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Animation */
        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<nav class="navbar px-4">
    <span class="navbar-brand">⏳ Time Capsule</span>

    <div class="ms-auto">
        <a href="/dashboard/" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="/create/" class="btn btn-light btn-sm">Create</a>
        <a href="/api/auth/logout/" class="btn btn-danger btn-sm ms-2">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
